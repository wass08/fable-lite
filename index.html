<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Fable lite</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>" />
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #0b0f14; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <!-- three.js's WebGPU backend reads these bitflag enums at module-eval
         time. On Safari without WebGPU the globals don't exist, so the import
         throws before three can fall back to WebGL2. Stub them with their real
         WebGPU spec values; the backend is still chosen via navigator.gpu, so
         this does NOT force WebGPU on — it only lets the module load. -->
    <script>
      (function () {
        if (typeof GPUShaderStage === 'undefined') {
          window.GPUShaderStage = { VERTEX: 1, FRAGMENT: 2, COMPUTE: 4 };
        }
        if (typeof GPUBufferUsage === 'undefined') {
          window.GPUBufferUsage = {
            MAP_READ: 1, MAP_WRITE: 2, COPY_SRC: 4, COPY_DST: 8, INDEX: 16,
            VERTEX: 32, UNIFORM: 64, STORAGE: 128, INDIRECT: 256, QUERY_RESOLVE: 512,
          };
        }
        if (typeof GPUTextureUsage === 'undefined') {
          window.GPUTextureUsage = {
            COPY_SRC: 1, COPY_DST: 2, TEXTURE_BINDING: 4, STORAGE_BINDING: 8, RENDER_ATTACHMENT: 16,
          };
        }
        if (typeof GPUMapMode === 'undefined') {
          window.GPUMapMode = { READ: 1, WRITE: 2 };
        }
      })();
    </script>
    <!-- catch-all error overlay: turns a silent black screen (esp. on phones
         with no console) into a readable message we can act on -->
    <div id="boot-error" style="display:none; position:fixed; inset:0; z-index:9999;
      background:#0b0f14; color:#ff9a8a; font:14px/1.5 monospace; padding:18px;
      overflow:auto; white-space:pre-wrap; -webkit-user-select:text; user-select:text;"></div>
    <script>
      (function () {
        var box = document.getElementById('boot-error');
        function show(label, detail) {
          box.style.display = 'block';
          box.textContent += '⚠ ' + label + '\n' + detail + '\n\n';
        }
        window.addEventListener('error', function (e) {
          show(e.message || 'error', (e.error && e.error.stack) || (e.filename + ':' + e.lineno));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          show('unhandled promise rejection', (r && (r.stack || r.message)) || String(r));
        });
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
